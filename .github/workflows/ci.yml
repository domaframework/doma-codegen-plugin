name: Java CI with Gradle

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out"
        required: false
        type: string
      publish:
        description: "Publish after verification"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build plugin
        run: ./gradlew build

      - name: Set version
        id: set-version
        run: ./gradlew properties | grep "^version:" | awk '{print $2}' | { read v; echo "version=$v" >> $GITHUB_OUTPUT; }

      - name: Print version
        run: echo ${{ steps.set-version.outputs.version }}

      - name: Publish plugin
        if: (github.event_name == 'push' || inputs.publish) && endsWith(steps.set-version.outputs.version, 'SNAPSHOT') == false
        run: >
          ./gradlew :codegen:publishPlugins 
          -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} 
          -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }}
          -Pversion=${{ steps.set-version.outputs.version }}
